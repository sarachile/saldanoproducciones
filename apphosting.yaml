# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Aumentamos el número máximo de instancias para permitir que el sitio escale
  # y no rechace solicitudes cuando hay varios usuarios o bots accediendo.
  maxInstances: 10
  # Especificamos recursos base para asegurar un buen rendimiento con videos y galerías.
  cpu: 1
  memoryMiB: 512
