# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Aumentamos significativamente el número máximo de instancias para manejar ráfagas de tráfico
  # y evitar que las solicitudes sean rechazadas con error 429.
  maxInstances: 50
  # Mantenemos 0 instancias mínimas para optimizar costos, pero permitimos un escalado más agresivo.
  minInstances: 0
  # Definimos la concurrencia para permitir que cada instancia maneje múltiples solicitudes de forma simultánea.
  concurrency: 80
  # Aumentamos la memoria a 1GB para mejorar el rendimiento al servir contenido multimedia pesado como videos.
  cpu: 1
  memoryMiB: 1024
